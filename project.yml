name: FyluAgency
options:
  bundleIdPrefix: com.fylu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_PREVIEWS: YES
    DEAD_CODE_STRIPPING: YES

targets:
  FyluAgency:
    type: application
    platform: macOS
    sources:
      - path: FyluAgency
    info:
      path: FyluAgency/Info.plist
      properties:
        CFBundleName: FyluAgency
        CFBundleDisplayName: Fylu Agency
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 Fylu"
        LSApplicationCategoryType: public.app-category.business
        NSPrincipalClass: NSApplication
    entitlements:
      path: FyluAgency/FyluAgency.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fylu.agency
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Fylu"
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        GENERATE_INFOPLIST_FILE: NO
